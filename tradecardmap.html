        <div id="sidebar">
        <div class="sidebar-wrapper">
          <div id="features">


              <div class="row">
                <div class="col-8">
                  <input type="text" class="form-control search" placeholder="Filter" />
                </div>
                <div class="col-4">
                  <button type="button" class="btn btn-primary pull-right sort" data-sort="feature-name" id="sort-btn"><i class="fa fa-sort"></i></button>
                </div>
              </div>

            <div class="sidebar-table">
              <table class="table table-hover" id="feature-list">
                <thead class="hidden">

                </thead>
                <tbody class="list">

                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div id="main-content">



                                <div id="map"></div>




       </div>


<div class="modal" id="featureModal" tabindex="-1">

  <div class="modal-dialog" role="document">
    <div class="modal-content">

          <div class="modal-header">
        <h4 class="modal-title" id="feature-title"></h4>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>



          <div class="modal-body">
            <div class="row">
              <div class="col-8">
                <div id="feature-info">

                </div>
              </div>
              <div class="col-4">
                <h5 >Address:</h5>
                  <p id="feature-address"></p>
                   <h5>Subjects:</h5>
                  <p id="feature-subjects"></p>
                  <h5>Date:</h5>
                  <p id="feature-year"></p>
                  <h5>Language(s) on Trade Card:</h5>
                  <p id="feature-language"></p>         </div>
          </div>

          <div class="modal-footer">
           <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
          </div>
        </div><!-- /.modal-content -->
      </div><!-- /.modal-dialog -->
    </div><!-- /.modal -->
</div>
    <div class="modal fade" id="attributionModal" tabindex="-1" role="dialog">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <button class="close" type="button" data-dismiss="modal" aria-hidden="true">&times;</button>
            <h4 class="modal-title">
              Developed by <a href='http://bryanmcbride.com'>bryanmcbride.com</a>
            </h4>
          </div>
          <div class="modal-body">
            <div id="attribution"></div>
          </div>
        </div><!-- /.modal-content -->
      </div><!-- /.modal-dialog -->
    </div><!-- /.modal -->
